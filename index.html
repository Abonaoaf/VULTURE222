<script>
const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/.json";

// وظيفة جلب البيانات عند فتح الصفحة
async function loadClients() {
    try {
        const response = await fetch(DB_URL);
        const data = await response.json();
        fullData = data || { clients: [] };
        renderClients(); // وظيفة عرض المشتركين في اللوحة
    } catch (e) {
        console.error("خطأ في جلب البيانات");
    }
}

// وظيفة حفظ ومزامنة البيانات (بدون Token!)
async function saveToCloud() {
    showLoading(true);
    try {
        await fetch(DB_URL, {
            method: 'PUT',
            body: JSON.stringify(fullData)
        });
        alert("تم الحفظ والمزامنة في سحابة جوجل بنجاح ✅");
    } catch (e) {
        alert("حدث خطأ أثناء الحفظ، تأكد من اتصال الإنترنت");
    }
    showLoading(false);
}

// استدعاء الجلب عند التحميل
window.onload = loadClients;
</script>
