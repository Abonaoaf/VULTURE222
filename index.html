<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة فولتشر الاحترافية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; --bg: #f1f5f9; --white: #ffffff; --danger: #ef4444; --success: #10b981; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--primary); }
        
        .admin-card { background: var(--white); max-width: 900px; margin: 10px auto; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 20px; }
        .header-title { display: flex; flex-direction: column; align-items: center; text-align: center; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; padding-bottom: 15px; gap: 10px; }
        @media (min-width: 600px) { .header-title { flex-direction: row; justify-content: space-between; text-align: right; } }
        
        #loginSection { display: none; }
        
        /* تصميم الحقول السبعة */
        .client-form { display: grid; grid-template-columns: 1fr; gap: 12px; background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        @media (min-width: 600px) { .client-form { grid-template-columns: 1fr 1fr; } }
        
        input { width: 100%; padding: 12px; border: 1.5px solid #cbd5e1; border-radius: 10px; font-size: 16px; font-family: inherit; }
        .full-width { grid-column: 1 / -1; }
        .btn-add { grid-column: 1 / -1; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; }

        /* بطاقة المشترك والعد التنازلي */
        .client-item { background: white; border: 1px solid #e2e8f0; padding: 15px; border-radius: 15px; margin-bottom: 15px; position: relative; }
        .client-info strong { color: var(--accent); font-size: 1.2rem; display: block; margin-bottom: 5px; }
        .client-details { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.85rem; color: #64748b; margin-bottom: 10px; }
        
        .countdown-box { background: #fff1f2; color: #e11d48; padding: 10px; border-radius: 10px; text-align: center; font-weight: bold; font-size: 0.85rem; border: 1px solid #fecdd3; }
        .countdown-grid { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
        .unit { background: #e11d48; color: white; padding: 2px 5px; border-radius: 4px; font-size: 0.75rem; }

        .btn-delete { position: absolute; left: 15px; top: 15px; color: var(--danger); background: #fee2e2; border: none; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; }
        
        .loading-overlay { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 2000; flex-direction: column; }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <i class="fas fa-spinner fa-spin fa-3x" style="color:var(--accent)"></i>
    <p id="loadStatus">جاري الاتصال بالسحابة...</p>
</div>

<div class="admin-card">
    <div class="header-title">
        <h2><i class="fas fa-user-shield"></i> منصة فولتشر المتكاملة</h2>
        <button onclick="exportData()" style="background:var(--success); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">نسخة احتياطية</button>
    </div>

    <div id="loginSection">
        <div class="client-form">
            <input type="text" id="cName" placeholder="اسم العميل">
            <input type="text" id="cPhone" placeholder="رقم الجوال">
            <input type="text" id="cUser" placeholder="اسم المستخدم">
            <input type="text" id="cPass" placeholder="الرقم السري">
            <input type="text" id="cLink" class="full-width" placeholder="الرابط">
            <label style="font-size: 0.8rem;">تاريخ البداية:</label>
            <input type="date" id="cStart">
            <label style="font-size: 0.8rem;">تاريخ النهاية:</label>
            <input type="date" id="cEnd">
            <button class="btn-add" onclick="addClient()">إضافة المشترك وتفعيل العد التنازلي</button>
        </div>
        <div id="clientsList"></div>
    </div>
</div>

<script>
    const _0x12a = ["\x68\x74\x74\x70\x73\x3a\x2f\x2f\x76\x75\x6c\x74\x75\x72\x65\x2d\x61\x70\x70\x2d\x31\x65\x66\x62\x61\x2d\x64\x65\x66\x61\x75\x6c\x74\x2d\x72\x74\x64\x62\x2e\x66\x69\x72\x65\x62\x61\x73\x65\x69\x6f\x2e\x63\x6f\x6d\x2f\x2e\x6a\x73\x6f\x6e", "\x41\x62\x6f\x4e\x61\x77\x61\x66\x5f\x50\x6c\x61\x74\x66\x6f\x72\x6d\x5f\x32\x30\x32\x36"];
    const DB_URL = _0x12a[0];
    const ADMIN_KEY = _0x12a[1];

    let globalData = { clients: [], apps: [] };

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') !== ADMIN_KEY) {
            document.getElementById('loadStatus').innerHTML = "⚠️ الدخول عبر الرابط السري فقط";
            return;
        }
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if (data) {
                globalData.clients = data.clients || [];
                globalData.apps = data.apps || [];
            }
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
            renderClients();
            setInterval(updateCountdowns, 1000);
        } catch (e) {
            document.getElementById('loadStatus').innerHTML = "خطأ في الاتصال بقاعدة البيانات";
        }
    }

    function renderClients() {
        const list = document.getElementById('clientsList');
        list.innerHTML = globalData.clients.slice().reverse().map((c, i) => {
            const originalIndex = globalData.clients.length - 1 - i;
            return `
            <div class="client-item">
                <button class="btn-delete" onclick="deleteClient(${originalIndex})"><i class="fas fa-trash"></i></button>
                <div class="client-info">
                    <strong>${c.name}</strong>
                    <div class="client-details">
                        <span><i class="fas fa-user"></i> ${c.user}</span>
                        <span><i class="fas fa-phone"></i> ${c.phone}</span>
                        <span><i class="fas fa-key"></i> ${c.pass}</span>
                        <span><i class="fas fa-calendar-alt"></i> ${c.start}</span>
                    </div>
                    <div style="font-size:0.75rem; word-break:break-all; color:var(--accent); margin-bottom:10px;">${c.link}</div>
                    <div class="countdown-box" id="timer-${originalIndex}">جاري الحساب...</div>
                </div>
            </div>
        `}).join('');
    }

    function updateCountdowns() {
        globalData.clients.forEach((c, index) => {
            const timerDiv = document.getElementById(`timer-${index}`);
            if (!timerDiv || !c.end) return;

            const now = new Date().getTime();
            const end = new Date(c.end).getTime();
            const diff = end - now;

            if (diff <= 0) {
                timerDiv.innerHTML = "❌ الاشتراك منتهي";
                return;
            }

            const secs = Math.floor(diff / 1000);
            const mins = Math.floor(secs / 60);
            const hours = Math.floor(mins / 60);
            const days = Math.floor(hours / 24);
            const months = Math.floor(days / 30.44);
            const years = Math.floor(months / 12);

            timerDiv.innerHTML = `
                المتبقي:
                <div class="countdown-grid">
                    <span class="unit">${years} سنة</span>
                    <span class="unit">${months % 12} شهر</span>
                    <span class="unit">${days % 30} يوم</span>
                    <span class="unit">${hours % 24} س</span>
                    <span class="unit">${mins % 60} د</span>
                    <span class="unit">${secs % 60} ث</span>
                </div>
            `;
        });
    }

    async function addClient() {
        const name = document.getElementById('cName').value;
        if (!name) return alert("يرجى تعبئة الحقول");

        document.getElementById('loadingOverlay').style.display = 'flex';
        globalData.clients.push({
            name: name,
            phone: document.getElementById('cPhone').value,
            user: document.getElementById('cUser').value,
            pass: document.getElementById('cPass').value,
            link: document.getElementById('cLink').value,
            start: document.getElementById('cStart').value,
            end: document.getElementById('cEnd').value
        });

        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(globalData) });
        location.reload();
    }

    async function deleteClient(index) {
        if (confirm("حذف؟")) {
            document.getElementById('loadingOverlay').style.display = 'flex';
            globalData.clients.splice(index, 1);
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(globalData) });
            location.reload();
        }
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(globalData));
        const dlAnchor = document.createElement('a');
        dlAnchor.setAttribute("href", dataStr);
        dlAnchor.setAttribute("download", "backup.json");
        dlAnchor.click();
    }

    init();
</script>
</body>
</html>
