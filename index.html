<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم فولتشر - إدارة المشتركين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; --bg: #f1f5f9; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .admin-card { background: var(--white); max-width: 900px; margin: auto; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 20px; }
        #loginSection { display: none; }
        .header-title { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .client-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
        .btn-add { grid-column: span 2; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .client-item { background: white; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .loading { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
    </style>
</head>
<body>

<div id="loading" class="loading">
    <i class="fas fa-sync fa-spin fa-3x" style="color:var(--accent)"></i>
    <p>جاري تأمين البيانات...</p>
</div>

<div class="admin-card">
    <div class="header-title">
        <h2><i class="fas fa-users-cog"></i> إدارة المشتركين (VULTURE222)</h2>
        <button onclick="exportData()" style="background:#10b981; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">تصدير JSON</button>
    </div>

    <div id="loginSection">
        <div class="client-form">
            <input type="text" id="cName" placeholder="اسم المشترك">
            <input type="text" id="cPhone" placeholder="رقم الهاتف">
            <input type="text" id="cPass" placeholder="كلمة المرور">
            <input type="date" id="cExpiry" placeholder="تاريخ الانتهاء">
            <button class="btn-add" onclick="addClient()">إضافة مشترك جديد</button>
        </div>
        <div id="clientsList"></div>
    </div>
</div>

<script>
    // تشفير الروابط وكلمة السر لحماية الـ 60 مشتركاً
    const _0x4f22=["\x68\x74\x74\x70\x73\x3a\x2f\x2f\x76\x75\x6c\x74\x75\x72\x65\x2d\x61\x70\x70\x2d\x31\x65\x66\x62\x61\x2d\x64\x65\x66\x61\x75\x6c\x74\x2d\x72\x74\x64\x62\x2e\x66\x69\x72\x65\x62\x61\x73\x65\x69\x6f\x2e\x63\x6f\x6d\x2f\x2e\x6a\x73\x6f\x6e","\x41\x62\x6f\x4e\x61\x77\x61\x66\x5f\x50\x6c\x61\x74\x66\x6f\x72\x6d\x5f\x32\x30\x32\x36"];
    const DB_URL = _0x4f22[0];
    const ADMIN_KEY = _0x4f22[1];

    let globalData = { clients: [], apps: [] };

    async function init() {
        toggleLoading(true);
        const res = await fetch(DB_URL);
        const data = await res.json();
        if(data) {
            globalData.clients = data.clients || [];
            globalData.apps = data.apps || []; [span_2](start_span)// الحفاظ على بيانات المتجر[span_2](end_span)
        }
        
        if(new URLSearchParams(window.location.search).get('admin') === ADMIN_KEY) {
            document.getElementById('loginSection').style.display = 'block';
            renderClients();
        } else {
            alert("غير مصرح بالدخول");
        }
        toggleLoading(false);
    }

    function renderClients() {
        const list = document.getElementById('clientsList');
        list.innerHTML = globalData.clients.map((c, i) => `
            <div class="client-item">
                <div>
                    <strong>${c.name}</strong><br>
                    <small>ينتهي في: ${c.expiry} | كلمة السر: ${c.pass}</small>
                </div>
                <button onclick="deleteClient(${i})" style="color:red; border:none; background:none; cursor:pointer;"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
    }

    async function addClient() {
        toggleLoading(true);
        globalData.clients.push({
            name: document.getElementById('cName').value,
            phone: document.getElementById('cPhone').value,
            pass: document.getElementById('cPass').value,
            expiry: document.getElementById('cExpiry').value,
            start: new Date().toISOString().split('T')[0]
        });
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(globalData) });
        location.reload();
    }

    async function deleteClient(i) {
        if(confirm("حذف المشترك؟")) {
            toggleLoading(true);
            globalData.clients.splice(i, 1);
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(globalData) });
            location.reload();
        }
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(globalData));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "vulture_backup.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function toggleLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
    init();
</script>
</body>
</html>
