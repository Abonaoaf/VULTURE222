<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة فولتشر | VULTURE222</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; --bg: #f1f5f9; --white: #ffffff; --danger: #ef4444; --success: #10b981; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--primary); }
        
        .admin-card { background: var(--white); max-width: 900px; margin: 10px auto; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 20px; }
        .header-title { display: flex; flex-direction: column; align-items: center; text-align: center; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; padding-bottom: 15px; gap: 10px; }
        @media (min-width: 600px) { .header-title { flex-direction: row; justify-content: space-between; text-align: right; } }
        
        #loginSection { display: none; }
        
        .client-form { display: grid; grid-template-columns: 1fr; gap: 12px; background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        @media (min-width: 600px) { .client-form { grid-template-columns: 1fr 1fr; } }
        
        input { width: 100%; padding: 12px; border: 1.5px solid #cbd5e1; border-radius: 10px; font-size: 16px; font-family: inherit; }
        .full-width { grid-column: 1 / -1; }
        .btn-add { grid-column: 1 / -1; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; }

        .client-item { background: white; border: 1px solid #e2e8f0; padding: 15px; border-radius: 15px; margin-bottom: 15px; position: relative; border-right: 5px solid var(--accent); }
        .client-info strong { color: var(--primary); font-size: 1.2rem; display: block; margin-bottom: 8px; }
        .client-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.9rem; color: #475569; margin-bottom: 10px; }
        
        /* تصميم العداد */
        .countdown-box { background: #0f172a; color: #38bdf8; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; font-family: monospace; font-size: 0.9rem; margin-top: 10px; border: 1px solid #1e293b; }
        .timer-grid { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
        .timer-unit { background: #38bdf8; color: #0f172a; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: 800; }

        .action-btns { display: flex; gap: 8px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; }
        .btn-copy { background: #e0f2fe; color: #0369a1; flex: 1; }
        .btn-edit { background: #fef3c7; color: #92400e; }
        .btn-del { background: #fee2e2; color: #b91c1c; }
        
        .loading-overlay { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 2000; flex-direction: column; }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <i class="fas fa-circle-notch fa-spin fa-3x" style="color:var(--accent)"></i>
    <p id="loadStatus">جاري المزامنة مع السحابة...</p>
</div>

<div class="admin-card">
    <div class="header-title">
        <h2><i class="fas fa-user-lock"></i> لوحة إدارة فولتشر</h2>
        <button onclick="exportData()" style="background:var(--success); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;"><i class="fas fa-download"></i> نسخة JSON</button>
    </div>

    <div id="loginSection">
        <div class="client-form">
            <input type="text" id="cName" placeholder="اسم العميل">
            <input type="text" id="cPhone" placeholder="رقم الجوال">
            <input type="text" id="cUser" placeholder="اسم المستخدم">
            <input type="text" id="cPass" placeholder="الرقم السري">
            <input type="text" id="cLink" class="full-width" placeholder="الرابط (https://...)">
            <div style="font-size:0.8rem">تاريخ البداية: <input type="date" id="cStart"></div>
            <div style="font-size:0.8rem">تاريخ النهاية: <input type="date" id="cEnd"></div>
            <button class="btn-add" id="mainBtn" onclick="addClient()">إضافة العميل وتفعيل الاشتراك</button>
        </div>
        <div id="clientsList"></div>
    </div>
</div>

<script>
    const _0x12a = ["\x68\x74\x74\x70\x73\x3a\x2f\x2f\x76\x75\x6c\x74\x75\x72\x65\x2d\x61\x70\x70\x2d\x31\x65\x66\x62\x61\x2d\x64\x65\x66\x61\x75\x6c\x74\x2d\x72\x74\x64\x62\x2e\x66\x69\x72\x65\x62\x61\x73\x65\x69\x6f\x2e\x63\x6f\x6d\x2f\x2e\x6a\x73\x6f\x6e", "\x41\x62\x6f\x4e\x61\x77\x61\x66\x5f\x50\x6c\x61\x74\x66\x6f\x72\x6d\x5f\x32\x30\x32\x36"];
    const DB_URL = _0x12a[0];
    const ADMIN_KEY = _0x12a[1];

    let globalData = { clients: [], apps: [] };
    let editIndex = -1;

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') !== ADMIN_KEY) {
            document.getElementById('loadStatus').innerHTML = "⚠️ غير مصرح بالدخول";
            return;
        }
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if (data) {
                globalData.clients = data.clients || [];
                globalData.apps = data.apps || [];
            }
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
            renderClients();
            setInterval(updateCountdowns, 1000);
        } catch (e) {
            document.getElementById('loadStatus').innerHTML = "خطأ في الاتصال بالسحابة";
        }
    }

    function renderClients() {
        const list = document.getElementById('clientsList');
        list.innerHTML = globalData.clients.slice().reverse().map((c, i) => {
            const idx = globalData.clients.length - 1 - i;
            return `
            <div class="client-item">
                <div class="client-info">
                    <strong>${c.name}</strong>
                    <div class="client-details">
                        <span><i class="fas fa-user-circle"></i> ${c.user}</span>
                        <span><i class="fas fa-phone"></i> ${c.phone}</span>
                        <span><i class="fas fa-key"></i> ${c.pass}</span>
                        <span><i class="fas fa-calendar-check"></i> يبدأ: ${c.start}</span>
                    </div>
                    <div class="countdown-box" id="timer-${idx}">جاري حساب المتبقي...</div>
                    <div class="action-btns">
                        <button class="btn btn-copy" onclick="copyLink('${c.link}')"><i class="fas fa-copy"></i> نسخ الرابط</button>
                        <button class="btn btn-edit" onclick="editClient(${idx})"><i class="fas fa-edit"></i> تعديل</button>
                        <button class="btn btn-del" onclick="deleteClient(${idx})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            </div>
        `}).join('');
    }

    function updateCountdowns() {
        globalData.clients.forEach((c, i) => {
            const box = document.getElementById(`timer-${i}`);
            if (!box || !c.end) return;

            const diff = new Date(c.end).getTime() - new Date().getTime();
            if (diff <= 0) { box.innerHTML = "🔴 اشتراك منتهي"; return; }

            const s = Math.floor(diff / 1000);
            const m = Math.floor(s / 60);
            const h = Math.floor(m / 60);
            const d = Math.floor(h / 24);
            const mo = Math.floor(d / 30.44);
            const y = Math.floor(mo / 12);

            box.innerHTML = `
                المتبقي:
                <div class="timer-grid">
                    <span class="timer-unit">${y}Y</span>
                    <span class="timer-unit">${mo%12}M</span>
                    <span class="timer-unit">${d%30}D</span>
                    <span class="timer-unit">${h%24}H</span>
                    <span class="timer-unit">${m%60}M</span>
                    <span class="timer-unit">${s%60}S</span>
                </div>
            `;
        });
    }

    function copyLink(link) {
        navigator.clipboard.writeText(link).then(() => alert("تم نسخ رابط العميل بنجاح!"));
    }

    function editClient(i) {
        const c = globalData.clients[i];
        document.getElementById('cName').value = c.name;
        document.getElementById('cPhone').value = c.phone;
        document.getElementById('cUser').value = c.user;
        document.getElementById('cPass').value = c.pass;
        document.getElementById('cLink').value = c.link;
        document.getElementById('cStart').value = c.start;
        document.getElementById('cEnd').value = c.end;
        editIndex = i;
        document.getElementById('mainBtn').innerHTML = "حفظ التعديلات الآن";
        document.getElementById('mainBtn').style.background = "#92400e";
        window.scrollTo(0,0);
    }

    async function addClient() {
        const name = document.getElementById('cName').value;
        if (!name) return alert("يرجى إدخال اسم العميل");

        document.getElementById('loadingOverlay').style.display = 'flex';
        
        const newClient = {
            name: name,
            phone: document.getElementById('cPhone').value,
            user: document.getElementById('cUser').value,
            pass: document.getElementById('cPass').value,
            link: document.getElementById('cLink').value,
            start: document.getElementById('cStart').value,
            end: document.getElementById('cEnd').value
        };

        if (editIndex > -1) {
            globalData.clients[editIndex] = newClient;
            editIndex = -1;
        } else {
            globalData.clients.push(newClient);
        }

        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(globalData) });
        location.reload();
    }

    async function deleteClient(i) {
        if (confirm("هل أنت متأكد من حذف هذا المشترك؟")) {
            document.getElementById('loadingOverlay').style.display = 'flex';
            globalData.clients.splice(i, 1);
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(globalData) });
            location.reload();
        }
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(globalData));
        const dl = document.createElement('a');
        dl.setAttribute("href", dataStr);
        dl.setAttribute("download", "backup.json");
        dl.click();
    }

    init();
</script>
</body>
</html>
