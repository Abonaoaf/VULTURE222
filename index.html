<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم فولتشر - إدارة المشتركين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; --bg: #f1f5f9; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .admin-card { background: var(--white); max-width: 900px; margin: auto; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 20px; }
        #loginSection { display: none; }
        .header-title { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .client-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; }
        .btn-add { grid-column: span 2; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .client-item { background: white; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .loading { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; text-align: center; }
        .error-msg { color: #dc2626; background: #fee2e2; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div id="loading" class="loading">
    <i class="fas fa-sync fa-spin fa-3x" style="color:var(--accent)"></i>
    <p id="loadText" style="margin-top:15px; font-weight:bold;">جاري الاتصال بقاعدة البيانات السحابية...</p>
    <div id="errorBox" class="error-msg"></div>
</div>

<div class="admin-card">
    <div class="header-title">
        <h2><i class="fas fa-users-cog"></i> إدارة المشتركين (VULTURE222)</h2>
        <button onclick="exportData()" style="background:#10b981; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">تصدير النسخة الاحتياطية</button>
    </div>

    <div id="loginSection">
        <div class="client-form">
            <input type="text" id="cName" placeholder="اسم المشترك">
            <input type="text" id="cPhone" placeholder="رقم الهاتف">
            <input type="text" id="cPass" placeholder="كلمة المرور">
            <input type="date" id="cExpiry">
            <button class="btn-add" onclick="addClient()">إضافة مشترك جديد للمنصة</button>
        </div>
        <div id="clientsList"></div>
    </div>
</div>

<script>
    // الإعدادات المباشرة لضمان الوصول السريع
    const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/.json";
    const ADMIN_KEY = "AboNawaf_Platform_2026";

    let globalData = { clients: [], apps: [] };

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const errorBox = document.getElementById('errorBox');
        
        // التحقق من مفتاح الإدارة في الرابط
        if(urlParams.get('admin') !== ADMIN_KEY) {
            document.getElementById('loadText').innerHTML = "⚠️ خطأ: يرجى استخدام الرابط الإداري السري للدخول.";
            return;
        }

        try {
            const res = await fetch(DB_URL);
            if (!res.ok) throw new Error("فشل الوصول لقاعدة البيانات. تأكد من إعدادات Rules.");
            
            const data = await res.json();
            if(data) {
                globalData.clients = data.clients || [];
                globalData.apps = data.apps || []; // الحفاظ على تطبيقات المتجر
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
            renderClients();

        } catch (e) {
            console.error(e);
            errorBox.innerText = "حدث خطأ: " + e.message + "\nتأكد من تغيير قواعد الأمان في Firebase إلى true.";
            errorBox.style.display = 'block';
        }
    }

    function renderClients() {
        const list = document.getElementById('clientsList');
        if (globalData.clients.length === 0) {
            list.innerHTML = "<center><p>لا يوجد مشتركين حالياً في المنصة.</p></center>";
            return;
        }
        list.innerHTML = globalData.clients.map((c, i) => `
            <div class="client-item">
                <div>
                    <strong>${c.name}</strong><br>
                    <small>الهاتف: ${c.phone || '-'} | كلمة السر: ${c.pass} | ينتهي في: ${c.expiry}</small>
                </div>
                <button onclick="deleteClient(${i})" style="color:#ef4444; border:none; background:none; cursor:pointer; font-size:1.2rem;"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
    }

    async function addClient() {
        const name = document.getElementById('cName').value;
        if(!name) return alert("يرجى إدخال اسم المشترك");
        
        document.getElementById('loading').style.display = 'flex';
        globalData.clients.push({
            name: name,
            phone: document.getElementById('cPhone').value,
            pass: document.getElementById('cPass').value,
            expiry: document.getElementById('cExpiry').value,
            start: new Date().toISOString().split('T')[0]
        });
        
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(globalData) });
        location.reload();
    }

    async function deleteClient(i) {
        if(confirm("هل أنت متأكد من حذف هذا المشترك؟")) {
            document.getElementById('loading').style.display = 'flex';
            globalData.clients.splice(i, 1);
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(globalData) });
            location.reload();
        }
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(globalData));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "vulture_backup.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    init();
</script>
</body>
</html>
